name: Deploy do Site Juridico
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install and Build
        run: |
          bun install
          bun run build || echo "Build failed, attempting static deploy"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tentamos a pasta dist, se não existir, usamos a raiz (.)
          path: |
            ./dist
            .
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
